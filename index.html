<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoops Royale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }

        /* ── Loading Screen ──────────────────────────────── */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #loading-screen h1 {
            font-size: 4rem;
            color: #ff6b35;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            text-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
            margin-bottom: 2rem;
            font-weight: 900;
        }
        #loading-screen h1 span {
            color: #fff;
        }
        #loading-bar-container {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ffa726);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        #loading-text {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-top: 1rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ── Top-left branding ───────────────────────────── */
        #ui-overlay {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 100;
            color: white;
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 0.15em;
            pointer-events: none;
        }

        /* ── Bottom controls hint ────────────────────────── */
        #controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }

        /* ── Top-right button bar ────────────────────────── */
        #ui-buttons {
            position: fixed;
            top: 18px; right: 20px;
            z-index: 100;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #ui-buttons button {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 7px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #fff;
            background: rgba(100, 100, 100, 0.55);
            backdrop-filter: blur(4px);
            transition: background 0.2s, transform 0.1s;
            font-weight: 600;
        }
        #ui-buttons button:hover {
            background: rgba(140, 140, 140, 0.7);
            transform: translateY(-1px);
        }
        #ui-buttons button.active {
            background: rgba(255, 107, 53, 0.7);
        }
        #ui-buttons .separator {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.2);
        }
        #toggle-transparent {
            background: rgba(255, 107, 53, 0.7) !important;
        }
        #toggle-daynight {
            background: rgba(255, 180, 50, 0.7) !important;
        }
        #btn-balldrop {
            background: rgba(255, 138, 51, 0.66);
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading-screen">
        <h1>Hoops <span>Royale</span></h1>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
        <div id="loading-text">Loading court...</div>
    </div>

    <!-- HUD -->
    <div id="ui-overlay">HOOPS ROYALE</div>

    <div id="ui-buttons">
        <button id="btn-orbit" class="active" onclick="switchCameraMode('orbit')">Orbit Cam</button>
        <button id="btn-freeroam" onclick="switchCameraMode('freeroam')">Free Roam</button>
        <button id="btn-player" onclick="switchCameraMode('player')">Drop In</button>
        <button id="btn-balldrop" onclick="dropBall()">Ball Drop</button>
        <div class="separator"></div>
        <button id="toggle-transparent" onclick="toggleTransparentHelpers()">Panels: ON</button>
        <div class="separator"></div>
        <button id="toggle-daynight" onclick="toggleDayNight()">DAY</button>
    </div>

    <div id="controls-hint">Click & Drag to look around | Scroll to zoom | Right-click & drag to pan</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
