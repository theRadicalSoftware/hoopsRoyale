<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoops Royale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }

        /* ── Loading Screen ──────────────────────────────── */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #loading-screen h1 {
            font-size: 4rem;
            color: #ff6b35;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            text-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
            margin-bottom: 2rem;
            font-weight: 900;
        }
        #loading-screen h1 span {
            color: #fff;
        }
        #loading-bar-container {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ffa726);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        #loading-text {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-top: 1rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ── Start Menu Overlay ─────────────────────────── */
        #start-menu {
            position: fixed;
            inset: 0;
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            background:
                radial-gradient(1200px 620px at 70% 10%, rgba(255, 140, 60, 0.12), transparent 62%),
                radial-gradient(1000px 640px at 18% 84%, rgba(90, 150, 255, 0.12), transparent 62%),
                linear-gradient(135deg, rgba(8, 16, 40, 0.54), rgba(12, 24, 52, 0.44));
            transition: opacity 0.55s ease;
        }
        #start-menu.active {
            opacity: 1;
            pointer-events: auto;
        }
        #start-menu.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #start-glass {
            width: min(86vw, 560px);
            padding: 36px 34px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.24);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0.09)),
                linear-gradient(120deg, rgba(20, 34, 73, 0.55), rgba(19, 28, 54, 0.45));
            backdrop-filter: blur(18px) saturate(135%);
            box-shadow:
                0 30px 70px rgba(0, 0, 0, 0.36),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
            color: #f5f7ff;
            text-align: center;
        }
        #start-eyebrow {
            font-size: 0.64rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(245, 248, 255, 0.68);
            margin-bottom: 14px;
        }
        #start-title {
            font-size: clamp(2rem, 6vw, 3.4rem);
            letter-spacing: 0.26em;
            text-transform: uppercase;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 16px;
            text-shadow: 0 0 24px rgba(255, 255, 255, 0.18);
        }
        #start-title span {
            color: #ff7a3d;
            text-shadow: 0 0 20px rgba(255, 122, 61, 0.38);
        }
        #start-subtitle {
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 237, 255, 0.78);
            margin-bottom: 26px;
        }
        #btn-start-game {
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 999px;
            padding: 11px 28px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            color: #ffffff;
            background: linear-gradient(90deg, rgba(255, 121, 58, 0.9), rgba(255, 163, 57, 0.86));
            box-shadow: 0 12px 30px rgba(255, 124, 60, 0.3);
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }
        #btn-start-game:hover {
            transform: translateY(-1px) scale(1.01);
            filter: brightness(1.06);
            box-shadow: 0 16px 32px rgba(255, 124, 60, 0.36);
        }
        #btn-start-game:active {
            transform: translateY(0);
        }
        #start-hint {
            margin-top: 14px;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(233, 239, 255, 0.56);
        }

        /* ── Top-left branding ───────────────────────────── */
        #ui-overlay {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 100;
            color: white;
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 0.15em;
            pointer-events: none;
        }

        /* ── Bottom controls hint ────────────────────────── */
        #controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }

        /* ── Top-right button bar ────────────────────────── */
        #ui-buttons {
            position: fixed;
            top: 18px; right: 20px;
            z-index: 100;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #ui-buttons button {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 7px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #fff;
            background: rgba(100, 100, 100, 0.55);
            backdrop-filter: blur(4px);
            transition: background 0.2s, transform 0.1s;
            font-weight: 600;
        }
        #ui-buttons button:hover {
            background: rgba(140, 140, 140, 0.7);
            transform: translateY(-1px);
        }
        #ui-buttons button.active {
            background: rgba(255, 107, 53, 0.7);
        }
        #ui-buttons .separator {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.2);
        }
        #toggle-transparent {
            background: rgba(255, 107, 53, 0.7) !important;
        }
        #toggle-daynight {
            background: rgba(255, 180, 50, 0.7) !important;
        }
        #btn-balldrop {
            background: rgba(255, 138, 51, 0.66);
        }
        #ui-overlay,
        #controls-hint,
        #ui-buttons {
            transition: opacity 0.35s ease;
        }
        .hud-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading-screen">
        <h1>Hoops <span>Royale</span></h1>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
        <div id="loading-text">Loading court...</div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" aria-hidden="true">
        <div id="start-glass">
            <div id="start-eyebrow">Street Session</div>
            <div id="start-title"><span>Hoops</span> Royale</div>
            <div id="start-subtitle">The Park Is Live</div>
            <button id="btn-start-game" onclick="startGame()">Click To Begin</button>
            <div id="start-hint">Environment will rotate slowly until start</div>
        </div>
    </div>

    <!-- HUD -->
    <div id="ui-overlay">HOOPS ROYALE</div>

    <div id="ui-buttons">
        <button id="btn-orbit" class="active" onclick="switchCameraMode('orbit')">Orbit Cam</button>
        <button id="btn-freeroam" onclick="switchCameraMode('freeroam')">Free Roam</button>
        <button id="btn-player" onclick="switchCameraMode('player')">Drop In</button>
        <button id="btn-balldrop" onclick="dropBall()">Ball Drop</button>
        <div class="separator"></div>
        <button id="toggle-transparent" onclick="toggleTransparentHelpers()">Panels: ON</button>
        <div class="separator"></div>
        <button id="toggle-daynight" onclick="toggleDayNight()">DAY</button>
    </div>

    <div id="controls-hint">Click & Drag to look around | Scroll to zoom | Right-click & drag to pan</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
